



<!DOCTYPE html>



<html lang="fa" dir="rtl">



<head>



<meta charset="UTF-8" />



<meta name="viewport" content="width=device-width, initial-scale=1.0"/>







<title>PA Dashboard Pro</title>







<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">



<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>







<style>



:root{



  --bg:#07070B;



  --card:rgba(255,255,255,0.04);



  --border:rgba(255,255,255,0.08);



  --text:#EDEDED;



  --muted:#9CA3AF;



  --accent:#A855F7;



  --accent2:#22D3EE;



}







*{margin:0;padding:0;box-sizing:border-box}







body{



  font-family:Vazirmatn;



  background:radial-gradient(circle at top,#0F0A1F,#07070B);



  color:var(--text);



}







/* NAV */



nav{



  position:fixed;top:0;right:0;left:0;



  height:60px;



  display:flex;



  align-items:center;



  justify-content:space-between;



  padding:0 24px;



  backdrop-filter:blur(20px);



  background:rgba(10,10,15,0.6);



  border-bottom:1px solid var(--border);



}







nav a{



  color:var(--muted);



  text-decoration:none;



  margin:0 10px;



  font-size:13px;



}



nav a:hover{color:white}







/* CONTAINER */



.container{



  max-width:1200px;



  margin:90px auto;



  padding:0 20px;



}







/* HERO */



.hero{



  display:grid;



  grid-template-columns:repeat(3,1fr);



  gap:16px;



  margin-bottom:30px;



}







.card{



  background:var(--card);



  border:1px solid var(--border);



  border-radius:16px;



  padding:18px;



  transition:0.3s;



}







.card:hover{



  transform:translateY(-4px);



  border-color:rgba(168,85,247,0.4);



}







.card h3{



  font-size:12px;



  color:var(--muted);



}







.card .value{



  font-size:28px;



  font-weight:700;



  margin-top:8px;



}







/* GRID */



.grid{



  display:grid;



  grid-template-columns:1fr 1fr;



  gap:16px;



  margin-top:20px;



}







.panel{



  background:var(--card);



  border:1px solid var(--border);



  border-radius:16px;



  padding:18px;



}







.title{



  font-size:14px;



  margin-bottom:12px;



  color:white;



}







/* RESPONSIVE */



@media(max-width:768px){



  .hero{grid-template-columns:1fr}



  .grid{grid-template-columns:1fr}



}



</style>



</head>







<body>







<nav>



  <div style="color:#A855F7;font-weight:700">PA Dashboard</div>



  <div>



    <a href="#">Product</a>



    <a href="#">Finance</a>



    <a href="#">Marketing</a>



  </div>



</nav>







<div class="container">







  <!-- HERO -->



  <div class="hero">







    <div class="card">



      <h3>Revenue</h3>



      <div class="value">$178.7M</div>



    </div>







    <div class="card">



      <h3>Conversion</h3>



      <div class="value">16.7%</div>



    </div>







    <div class="card">



      <h3>Return Rate</h3>



      <div class="value">22.5%</div>



    </div>







  </div>







  <!-- PANELS -->



  <div class="grid">







    <div class="panel">



      <div class="title">User Funnel</div>



      <canvas id="c1"></canvas>



    </div>







    <div class="panel">



      <div class="title">Revenue Trend</div>



      <canvas id="c2"></canvas>



    </div>







  </div>







</div>







<script>



new Chart(document.getElementById("c1"), {



  type:"doughnut",



  data:{



    labels:["Visit","AI","Buy"],



    datasets:[{



      data:[1000,26,167],



      backgroundColor:["#A855F7","#22D3EE","#34D399"]



    }]



  }



});







new Chart(document.getElementById("c2"), {



  type:"line",



  data:{



    labels:["Mar","Apr","May","Jun","Jul","Aug"],



    datasets:[{



      data:[30,32,25,30,20,18],



      borderColor:"#A855F7",



      tension:0.4



    }]



  }



});



</script>







</body>



</html>
